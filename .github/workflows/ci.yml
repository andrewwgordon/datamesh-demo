name: CI

on:
  push:
  pull_request:

jobs:
  contract-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest pyyaml jsonschema
      - name: Validate contracts
        run: make validate

  smoke-stack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest
      - name: Start platform stack
        run: make up
      - name: Run Phase A smoke tests
        run: python -m pytest -q tests/smoke/test_phase_a_stack.py
      - name: Dump compose status on failure
        if: failure()
        run: docker compose -f platform/docker-compose.yml -f .devcontainer/docker-compose.codespaces.yml ps
      - name: Tear down platform stack
        if: always()
        run: make down
