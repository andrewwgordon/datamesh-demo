name: Ticket
description: Implement a single AGENTS.md ticket (one PR only)
title: "<Ticket ID>: <Ticket Title>"
labels: ["ticket"]
body:
  - type: markdown
    attributes:
      value: |
        ⚠️ **IMPORTANT**
        - This ticket MUST correspond to a ticket in `AGENTS.md`
        - Implement **exactly one ticket per PR**
        - No scope expansion

  - type: input
    id: ticket_id
    attributes:
      label: Ticket ID
      description: Must match AGENTS.md (e.g. C2, D1, E3)
      placeholder: "D2"
    validations:
      required: true

  - type: input
    id: epic_id
    attributes:
      label: Epic ID
      description: Parent Epic from AGENTS.md (A–G)
      placeholder: "D"
    validations:
      required: true

  - type: input
    id: agents_ref
    attributes:
      label: AGENTS.md Reference
      description: Paste the exact ticket text from AGENTS.md
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## 🎯 Goal
        Copy this directly from AGENTS.md

  - type: textarea
    id: goal
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## 📦 Deliverables
        (Files, services, scripts, specs)

  - type: textarea
    id: deliverables
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## ✅ Acceptance Criteria
        Must be **testable** and **deterministic**

  - type: textarea
    id: acceptance
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## 🧪 Tests Required
        Check all that apply.

  - type: checkboxes
    id: tests
    attributes:
      options:
        - label: Unit tests
        - label: Integration tests
        - label: End‑to‑end tests
        - label: Contract validation

  - type: markdown
    attributes:
      value: |
        ## 🔗 Contracts Affected
        List any schema/specs touched (JSON Schema, AsyncAPI, OpenAPI)

  - type: textarea
    id: contracts

  - type: markdown
    attributes:
      value: |
        ## ⚙️ Verification
        Must run successfully in Codespaces.

  - type: textarea
    id: verification
    value: |
      make validate
      make test
      make e2e (if applicable)

  - type: checkboxes
    id: readiness
    attributes:
      label: Ready to Implement
      options:
        - label: Ticket text copied verbatim from AGENTS.md
        - label: One‑PR scope confirmed
        - label: Contracts updated first (if applicable)
