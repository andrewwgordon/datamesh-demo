name: Epic
description: Create an Epic that maps directly to an EPIC in AGENTS.md
title: "EPIC <ID>: <Title>"
labels: ["epic"]
body:
  - type: markdown
    attributes:
      value: |
        ## 📘 Epic Definition
        This Epic **must map exactly to an EPIC in `AGENTS.md`**.
        Do **not** introduce new scope here.

  - type: input
    id: epic_id
    attributes:
      label: Epic ID
      description: Must match AGENTS.md (e.g. A, B, C, D, E, F, G)
      placeholder: "A"
    validations:
      required: true

  - type: input
    id: agents_ref
    attributes:
      label: AGENTS.md Reference
      description: Copy the EPIC header text from AGENTS.md
      placeholder: "EPIC A — Platform (Compose)"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## 🎯 Objectives
        (Copy verbatim from AGENTS.md)

  - type: textarea
    id: objectives
    attributes:
      label: Objectives
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## ✅ Acceptance Criteria
        (High‑level epic completion definition)

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## 📎 Linked Tickets
        Child tickets should:
        - Reference this Epic
        - Include their AGENTS.md Ticket ID (e.g. A1, D2)

  - type: checkboxes
    id: ready
    attributes:
      label: Epic Readiness
      options:
        - label: Mapped exactly to AGENTS.md
        - label: Scope unchanged
        - label: Can be completed via child tickets only
